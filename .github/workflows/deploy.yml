# ========================================
# Bangoo Frontend - CI/CD Deployment
# ========================================
# Triggers on push to main branch
# Builds, tests, and deploys to VPS
# ========================================

name: Deploy Bangoo Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Job 1: Lint and Type Check
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint || true

  # Job 2: Build and Deploy
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            # Navigate to project directory
            cd /var/www/bangoo-frontend || exit 1

            # Pull latest changes
            git pull origin main

            # Create .env file from secrets
            cat > .env << 'ENVEOF'
            NEXT_PUBLIC_MEDUSA_BACKEND_URL=${{ secrets.NEXT_PUBLIC_MEDUSA_BACKEND_URL }}
            NEXT_PUBLIC_BASE_URL=${{ secrets.NEXT_PUBLIC_BASE_URL }}
            NEXT_PUBLIC_DEFAULT_REGION=${{ secrets.NEXT_PUBLIC_DEFAULT_REGION }}
            NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY }}
            REVALIDATE_WINDOW=${{ secrets.REVALIDATE_WINDOW }}
            ENVEOF

            # Build and restart containers
            docker-compose down
            docker-compose up -d --build

            # Wait for health check
            echo "Waiting for service to be healthy..."
            sleep 30

            # Verify deployment
            if curl -sf http://localhost:3000 > /dev/null; then
              echo "Deployment successful!"
            else
              echo "Deployment may have issues. Check logs."
              docker-compose logs --tail=50 frontend
              exit 1
            fi

            # Clean up old images
            docker image prune -f

  # Job 3: Notify on failure
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    steps:
      - name: Deployment Failed
        run: |
          echo "::error::Deployment failed! Check the deploy job logs for details."
